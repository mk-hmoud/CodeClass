services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: ./server
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/api/language', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  client:
    build:
      context: ./client
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_healthy

  judge:
    build:
      context: ./judge
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      # Docker-out-of-Docker: share the host Docker socket so the judge
      # can spawn sandbox containers (judge-py, judge-cpp, judge-js) on the host
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy

  # Language runner images — built by `docker compose build`, never started as containers.
  # The judge spawns these on the host Docker daemon when evaluating submissions.
  runner-py:
    build:
      context: ./judge/docker_images/python
    image: judge-py
    profiles: ["runners"]

  runner-cpp:
    build:
      context: "./judge/docker_images/c\\cpp"
    image: judge-cpp
    profiles: ["runners"]

  runner-js:
    build:
      context: "./judge/docker_images/javascript\\typescript"
    image: judge-js
    profiles: ["runners"]

volumes:
  db_data:
  redis_data:
